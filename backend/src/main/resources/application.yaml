spring:
  application:
    name: calorietracker

  datasource:
    url: jdbc:h2:mem:caloriedb
    driver-class-name: org.h2.Driver
    username: sa
    password: 1234

  h2:
    console:
      enabled: true
      path: /h2-console

  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: true

server:
  port: 8080